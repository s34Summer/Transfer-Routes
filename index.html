        function highlightText(sourceText, queryText) {
            if (!queryText) return sourceText;
            const escapedQuery = queryText.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            return sourceText.replace(regex, '<mark class="bg-[#1C2C5B] text-white font-semibold px-1 rounded shadow-xs inline-block">$1</mark>');
        }

        function formatClientPhoneNumber(rawString) {
            if (!rawString) return "";
            let digits = String(rawString).replace(/\D/g, "");
            if (digits.length < 6 || /^0+$/.test(digits)) return ""; 
            if (digits.startsWith("00")) return digits;
            return "00" + digits; 
        }

        function formatDriverPhoneNumber(rawString) {
            if (!rawString) return "";
            return String(rawString).replace(/\s+/g, "").trim();
        }

        function handleSystemRedirect(refNum, systemUrlBase) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(refNum).then(() => {
                    window.open(`${systemUrlBase}?ref=${refNum}`, '_blank');
                }).catch(err => {
                    console.error("Clipboard copy failed: ", err);
                    window.open(`${systemUrlBase}?ref=${refNum}`, '_blank');
                });
            } else {
                window.open(`${systemUrlBase}?ref=${refNum}`, '_blank');
            }
        }

        async function handleContactClick(event, name, phone, mode) {
            if (window.matchMedia("(min-width: 1024px)").matches) {
                event.preventDefault(); 
                
                currentModalPhoneRaw = phone;
                document.getElementById('modalPassengerName').innerText = name;
                document.getElementById('modalPhoneNumber').innerText = phone;
                document.getElementById('modalActionType').innerText = mode === 'tel' ? '📞 CELLULAR DIAL ROUTE' : '💬 WHATSAPP AUDIO CALL';
                
                const qrContainer = document.getElementById('qrcodeCanvas');
                const videoNode = document.getElementById('cameraPreviewStream');
                
                qrContainer.innerHTML = "";
                qrContainer.classList.remove('hidden');
                videoNode.classList.add('hidden');
                
                let qrPayload = "";
                if (mode === 'tel') {
                    qrPayload = `tel:${phone}`;
                } else {
                    let cleanWhatsAppNum = phone.startsWith("00") ? phone.replace(/^00/, "+") : phone;
                    if (!cleanWhatsAppNum.startsWith("+") && cleanWhatsAppNum.length > 6) {
                        cleanWhatsAppNum = "+" + cleanWhatsAppNum;
                    }
                    qrPayload = `https://wa.me/${cleanWhatsAppNum}`;
                }
                
                new QRCode(qrContainer, {
                    text: qrPayload,
                    width: 160,
                    height: 160,
                    colorDark : "#1C2C5B",
                    colorLight : "#F8FAFC",
                    correctLevel : QRCode.CorrectLevel.H
                });
                
                document.getElementById('desktopModal').classList.remove('hidden');
            } else {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    initiateAsyncMobileCameraWarmup();
                }
            }
        }

        async function initiateAsyncMobileCameraWarmup() {
            const videoNode = document.getElementById('cameraPreviewStream');
            const qrContainer = document.getElementById('qrcodeCanvas');
            
            if (activeCameraStreamObject) {
                activeCameraStreamObject.getTracks().forEach(track => track.stop());
            }

            const hardwareConstraints = {
                video: {
                    facingMode: "environment",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(hardwareConstraints);
                activeCameraStreamObject = stream;
                
                videoNode.srcObject = stream;
                qrContainer.classList.add('hidden');
                videoNode.classList.remove('hidden');
                
                setTimeout(() => {
                    videoNode.play().catch(err => console.log("Stream play deferred: ", err));
                }, 150);

            } catch (err) {
                console.warn("Hardware stream warm-up skipped, falling back to graphics context rendering mode.", err);
                qrContainer.classList.remove('hidden');
                videoNode.classList.add('hidden');
            }
        }

        function stopCameraAndCloseModal() {
            if (activeCameraStreamObject) {
                activeCameraStreamObject.getTracks().forEach(track => track.stop());
                activeCameraStreamObject = null;
            }
            document.getElementById('desktopModal').classList.add('hidden');
        }

        function closeDesktopModal(event) {
            stopCameraAndCloseModal();
        }

        function copyModalNumber() {
            if (currentModalPhoneRaw) {
                navigator.clipboard.writeText(currentModalPhoneRaw);
                alert("Phone number copied to clipboard: " + currentModalPhoneRaw);
            }
        }

        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('statusMessage').innerHTML = `<span class='text-[#FF8833] font-black animate-pulse'>⏳ INITIATING EXCEL ALLOCATIONS ENGINE...</span>`;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array', cellNF: true, cellText: true});
                
                excelDriversMap = {}; 
                let sheetNamesList = workbook.SheetNames;
                let currentSheetIdx = 0;
                let totalProcessedRows = 0;

                function processNextExcelSheetChunk() {
                    if (currentSheetIdx < sheetNamesList.length) {
                        let sheetName = sheetNamesList[currentSheetIdx];
                        const worksheet = workbook.Sheets[sheetName];
                        const sheetData = XLSX.utils.sheet_to_json(worksheet, {header: 1, raw: false});
                        
                        let currentRowIdx = 1; 
                        
                        function processRowBatchInsideSheet() {
                            let batchCount = 0;
                            while (currentRowIdx < sheetData.length && batchCount < 50) {
                                const row = sheetData[currentRowIdx];
                                if (row && row.length >= 2) {
                                    const voucher = String(row[1] || "").trim();    
                                    const driverName = String(row[4] || "").trim(); 
                                    const driverPhone = String(row[5] || "").trim(); 
                                    
                                    if (voucher && voucher !== "undefined") {
                                        excelDriversMap[voucher] = {
                                            name: driverName || "Assigned Driver",
                                            phone: formatDriverPhoneNumber(driverPhone)
                                        };
                                        totalProcessedRows++;
                                    }
                                }
                                currentRowIdx++;
                                batchCount++;
                            }

                            document.getElementById('statusMessage').innerHTML = `<span class='text-[#FF8833] font-black animate-pulse'>⏳ DECOMPRESSING DRIVERS SHEET: "${sheetName.toUpperCase()}" [ROW ${currentRowIdx}/${sheetData.length}]...</span>`;

                            if (currentRowIdx < sheetData.length) {
                                setTimeout(processRowBatchInsideSheet, 1);
                            } else {
                                currentSheetIdx++;
                                setTimeout(processNextExcelSheetChunk, 5);
                            }
                        }
                        processRowBatchInsideSheet();
                    } else {
                        applyExcelDriversToLoadedManifests();
                        document.getElementById('statusMessage').classList.add('hidden');
                        alert(`Driver roster parsed successfully. Linked allocations.`);
                        renderManifestCards();
                    }
                }
                processNextExcelSheetChunk();
            };
            reader.readAsArrayBuffer(file);
        }

        function applyExcelDriversToLoadedManifests() {
            extractedManifests.forEach(manifest => {
                const vId = manifest.voucherId;
                if (vId && excelDriversMap[vId]) {
                    if (excelDriversMap[vId].name) manifest.busSupplier = excelDriversMap[vId].name;
                    if (excelDriversMap[vId].phone) {
                        manifest.driverPhone = excelDriversMap[vId].phone;
                    }
                }
            });
        }

        async function handlePDFUpload(e, transferType) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('statusMessage').innerHTML = `<span class='text-[#FF8833] font-black animate-pulse'>⏳ PROCESSING ${transferType.toUpperCase()} MANIFEST...</span>`;
            
            const fileReader = new FileReader();
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let totalPages = pdf.numPages;
                    let processPageIdx = 1;
                    
                    function processNextPageChunk() {
                        if (processPageIdx <= totalPages) {
                            pdf.getPage(processPageIdx).then(async (page) => {
                                const textContent = await page.getTextContent();
                                const items = textContent.items.map(item => ({
                                    text: item.str.trim(),
                                    y: item.transform[5],
                                    x: item.transform[4]
                                })).filter(item => item.text !== "");

                                if (items.length > 0) {
                                    parseTwoRowPairedLayout(items, transferType);
                                }
                                
                                document.getElementById('statusMessage').innerHTML = `<span class='text-[#FF8833] font-black animate-pulse'>⏳ DECOMPRESSING MANIFEST: PAGE ${processPageIdx} OF ${totalPages}...</span>`;
                                processPageIdx++;
                                setTimeout(processNextPageChunk, 5);
                            });
                        } else {
                            finalizeParsing();
                        }
                    }
                    processNextPageChunk();
                } catch (error) {
                    console.error(error);
                    alert("Error parsing PDF data streams.");
                }
            };
            fileReader.readAsArrayBuffer(file);
        }

        function finalizeParsing() {
            if (extractedManifests.length > 0) {
                extractedManifests.forEach(manifest => {
                    manifest.stops.sort((a, b) => a.pickupTime.localeCompare(b.pickupTime));
                    if (manifest.stops.length > 0) {
                        manifest.sortTime = manifest.stops[0].pickupTime;
                    }
                });

                extractedManifests.sort((a, b) => (a.sortTime || "23:59").localeCompare(b.sortTime || "23:59"));

                document.getElementById('searchInput').disabled = false;
                document.getElementById('statusMessage').classList.add('hidden');
                setActiveTab(activeTransferTab);
            }
        }

        function parseTwoRowPairedLayout(items, transferType) {
            let lineMap = {};
            items.forEach(item => {
                let key = Math.round(item.y);
                let foundKey = Object.keys(lineMap).find(k => Math.abs(k - key) <= 6);
                if (foundKey) {
                    lineMap[foundKey].push(item);
                } else {
                    lineMap[key] = [item];
                }
            });

            let sortedYKeys = Object.keys(lineMap).sort((a, b) => b - a);
            let processedLines = sortedYKeys.map(key => {
                let rowItems = lineMap[key].sort((a, b) => a.x - b.x);
                return {
                    y: parseFloat(key),
                    text: rowItems.map(it => it.text).join(" "),
                    rawItems: rowItems
                };
            });

            let globalVoucherNo = "N/A";
            let flightCode = "N/A";
            let masterFlightTime = "00:00";
            let driverPhone = "";
            let busSupplierName = "easyJet Holidays";
            let vehicleType = "Coaches Transfer";
            let prefixCategory = "COACH"; 
            let faxHeaderX = -1;

            processedLines.forEach(line => {
                if (line.text.includes("Voucher No.")) {
                    const vMatch = line.text.match(/Voucher No\.\s*(\d+)/) || line.text.match(/No\.\s*(\d+)/);
                    if (vMatch) globalVoucherNo = vMatch[1];
                }
                if (line.text.includes("Flight") || line.text.match(/EZY\d+/i)) {
                    const fMatch = line.text.match(/Flight\s+([A-Z0-9]+)/i) || line.text.match(/(EZY\d+)/i);
                    if (fMatch) flightCode = fMatch[1];
                    const tMatch = line.text.match(/(\d{2}:\d{2})/);
                    if (tMatch) masterFlightTime = tMatch[1];
                }
                if (line.text.match(/Driver[:\s]+(\d+)/i)) {
                    const dMatch = line.text.match(/Driver[:\s]+(\d+)/i);
                    if (dMatch) driverPhone = dMatch[1].trim();
                }
                
                let faxItem = line.rawItems.find(it => it.text.toUpperCase() === "FAX");
                if (faxItem) {
                    faxHeaderX = faxItem.x;
                }

                if (line.text.includes("Transport")) {
                    const tMatch = line.text.match(/Transport\s+([A-Z0-9]+)/i);
                    if (tMatch) {
                        const transportCode = tMatch[1].toUpperCase();
                        if (transportCode.startsWith("ST")) {
                            busSupplierName = "Stavrakis Taxi";
                            vehicleType = "Taxi Transfer";
                            driverPhone = "24102297"; 
                            prefixCategory = "TAXI";
                        } else if (transportCode.startsWith("AP")) {
                            busSupplierName = "Aphrodite Taxi";
                            vehicleType = "Taxi Transfer";
                            driverPhone = "26934555"; 
                            prefixCategory = "TAXI";
                        } else if (transportCode.startsWith("XC")) {
                            busSupplierName = "easyJet Holidays";
                            vehicleType = "Shuttle Transfer";
                            prefixCategory = "SHUTTLE";
                        } else if (transportCode.startsWith("NC")) {
                            busSupplierName = "easyJet Holidays";
                            vehicleType = "Adapted Transfer";
                            driverPhone = "22487308";
                            prefixCategory = "ADAPTED";
                        }
                    }
                }
            });

            if (globalVoucherNo !== "N/A" && excelDriversMap[globalVoucherNo]) {
                const matchData = excelDriversMap[globalVoucherNo];
                if (matchData.name) busSupplierName = matchData.name;
                if (matchData.phone) driverPhone = matchData.phone;
            }

            for (let i = 0; i < processedLines.length; i++) {
                let currentLine = processedLines[i];
                let refMatch = currentLine.text.match(/\b(\d{7})\b/);

                if (refMatch) {
                    const refNum = refMatch[1];
                    let hotelName = "UNKNOWN PROPERTY";
                    let pickupTime = "00:00";

                    for (let j = i - 1; j >= 0; j--) {
                        let potentialHeader = processedLines[j];
                        let timeMatch = potentialHeader.text.match(/(\d{2}:\d{2})/);
                        
                        if (timeMatch && !potentialHeader.text.includes("EZY") && !potentialHeader.text.includes("Flight")) {
                            let possibleHotel = potentialHeader.text.replace(timeMatch[1], "").replace(/\b\d{5,6}\b/g, "").trim();
                            let isDocTitle = /^(ARRIVAL|DEPARTURE)\s+TRANSFER/i.test(possibleHotel) || possibleHotel.toUpperCase() === "ARRIVAL TRANSFER" || possibleHotel.toUpperCase() === "DEPARTURE TRANSFER";
                            
                            if (!isDocTitle) {
                                pickupTime = timeMatch[1];
                                hotelName = possibleHotel.replace(/ARRIVAL\s+TRANSFER/i, "")
                                                         .replace(/DEPARTURE\s+TRANSFER/i, "")
                                                         .trim();
                                break;
                            }
                        }
                    }

                    let clientPhone = "";
                    let leadName = "PASSENGER RECORD";
                    let calculatedPaxTotal = 1;

                    currentLine.rawItems.forEach(item => {
                        let cleanDigits = item.text.replace(/\D/g, "");
                        if (cleanDigits.length >= 8 && cleanDigits !== refNum) {
                            clientPhone = formatClientPhoneNumber(item.text); 
                        }
                    });

                    let numericTokensOnRow = [];
                    currentLine.rawItems.forEach(item => {
                        let rawStr = item.text.trim();
                        if (/^\d+$/.test(rawStr)) {
                            numericTokensOnRow.push(parseInt(rawStr, 10));
                        }
                    });
                    
                    let foundValidPaxToken = numericTokensOnRow.find(val => val > 0 && val < 25 && val !== parseInt(refNum, 10));
                    if (foundValidPaxToken) {
                        calculatedPaxTotal = foundValidPaxToken;
                    }

                    let wordsArray = currentLine.text.split(/\s+/);
                    for (let k = 0; k < wordsArray.length; k++) {
                        let token = wordsArray[k];
                        if (/[A-Za-z]/.test(token) && !token.includes("EZY") && !token.includes("EASYJET") && !token.includes("HOLI") && !/^[A-Za-z]{1,4}\d+/i.test(token) && token.length > 1) {
                            leadName = token;
                            break;
                        }
                    }

                    let manifestGroupKey = (globalVoucherNo !== "N/A" ? globalVoucherNo : flightCode).toLowerCase().replace(/\s+/g, "");
                    let targetManifest = extractedManifests.find(m => m.groupKey === manifestGroupKey && m.type === transferType);

                    if (!targetManifest) {
                        targetManifest = {
                            groupKey: manifestGroupKey,
                            type: transferType,
                            voucherId: globalVoucherNo,
                            busSupplier: busSupplierName,
                            vehicle: vehicleType,
                            prefixCategory: prefixCategory, 
                            flight: flightCode,
                            routeTime: masterFlightTime,
                            sortTime: pickupTime,
                            driverPhone: driverPhone,
                            stops: [],
                            searchString: ""
                        };
                        extractedManifests.push(targetManifest);
                    }

                    let targetStop = targetManifest.stops.find(s => s.hotelName === hotelName);
                    if (!targetStop) {
                        targetStop = {
                            hotelName: hotelName,
                            pickupTime: pickupTime,
                            passengers: []
                        };
                        targetManifest.stops.push(targetStop);
                    }

                    if (!targetStop.passengers.some(p => p.refNum === refNum)) {
                        targetStop.passengers.push({
                            leadName: leadName.toUpperCase(),
                            refNum: refNum,
                            paxCount: calculatedPaxTotal,
                            clientPhone: clientPhone
                        });
                        targetManifest.searchString += ` ${leadName} ${refNum} ${hotelName}`.toLowerCase();
                    }
                }
            }
        }

        function renderManifestCards() {
            const query = document.getElementById('searchInput').value.trim();
            const lowerQuery = query.toLowerCase();
            const container = document.getElementById('manifestsContainer');
            container.innerHTML = '';

            let visibleCount = 0;

            extractedManifests.forEach(manifest => {
                if (manifest.type !== activeTransferTab) return;
                if (activePrefixTab !== 'ALL' && manifest.prefixCategory !== activePrefixTab) return;
                if (lowerQuery && !manifest.searchString.includes(lowerQuery) && !manifest.flight.toLowerCase().includes(lowerQuery) && !manifest.voucherId.toLowerCase().includes(lowerQuery)) return;

                visibleCount++;

                const manifestBlock = document.createElement('div');
                manifestBlock.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden w-full h-fit";

                let stopsHtml = '';
                manifest.stops.forEach(stop => {
                    let passengersHtml = '';
                    
                    stop.passengers.forEach(p => {
                        const matchesName = p.leadName.toLowerCase().includes(lowerQuery);
                        const matchesRef = p.refNum.toLowerCase().includes(lowerQuery);
                        const matchesHotel = stop.hotelName.toLowerCase().includes(lowerQuery);
                        
                        if (lowerQuery && !matchesName && !matchesRef && !matchesHotel) return;

                        const safeRef = String(p.refNum).replace(/'/g, "\\'");
                        const highlightedName = highlightText(p.leadName, query);
                        const highlightedRef = highlightText(p.refNum, query);

                        let communicationButtonsHtml = "";
                        if (p.clientPhone) {
                            let dialDestination = `tel:${p.clientPhone}`;
                            let cleanNumber = p.clientPhone.startsWith("00") ? p.clientPhone.replace(/^00/, "+") : p.clientPhone;
                            if (!cleanNumber.startsWith("+") && cleanNumber.length > 6) {
                                cleanNumber = "+" + cleanNumber;
                            }
                            let whatsappLink = `https://wa.me/${cleanNumber}`;
                            const safeJSName = p.leadName.replace(/'/g, "\\'");

                            communicationButtonsHtml = `
                                <a href="${dialDestination}" onclick="handleContactClick(event, '${safeJSName}', '${p.clientPhone}', 'tel')" title="Cellular Dial" class="w-8 h-8 text-sm border rounded-lg flex items-center justify-center transition-all bg-emerald-50 text-emerald-600 border-emerald-200 hover:bg-emerald-100">📞</a>
                                <a href="${whatsappLink}" onclick="handleContactClick(event, '${safeJSName}', '${p.clientPhone}', 'whatsapp')" title="WhatsApp Call" class="w-8 h-8 text-sm border rounded-lg flex items-center justify-center transition-all bg-green-50 text-green-600 border-green-200 hover:bg-green-100">💬</a>
                            `;
                        }

                        passengersHtml += `
                            <div class="flex items-center justify-between py-1.5 border-b border-slate-100 last:border-0 gap-2 text-sm">
                                <div class="flex items-center gap-3 truncate flex-1">
                                    <span class="font-bold text-slate-900 uppercase min-w-[120px] truncate">${highlightedName}</span>
                                    <span class="text-xs text-slate-500 font-mono">Ref: <span class="text-slate-700 bg-slate-100 px-1 py-0.5 rounded font-semibold">${highlightedRef}</span></span>
                                    <span class="text-xs px-1.5 py-0.5 rounded bg-orange-100 text-[#E07722] font-black">PAX: ${p.paxCount}</span>
                                </div>
                                <div class="flex gap-1 shrink-0">
                                    <button onclick="handleSystemRedirect('${safeRef}', '${COMMENTS_SYSTEM_STATIC_URL}')" aria-label="Notes" class="w-8 h-8 text-sm bg-slate-50 border border-slate-200 rounded-lg flex items-center justify-center shadow-xs hover:bg-slate-100">📝</button>
                                    ${communicationButtonsHtml}
                                    <button onclick="handleSystemRedirect('${safeRef}', '${GPS_SYSTEM_STATIC_URL}')" aria-label="Track" class="w-8 h-8 text-sm bg-slate-50 border border-slate-200 rounded-lg flex items-center justify-center shadow-xs hover:bg-slate-100">🚌</button>
                                </div>
                            </div>
                        `;
                    });

                    if (!passengersHtml) return;

                    const highlightedHotel = highlightText(stop.hotelName, query);
                    const timingLabel = manifest.type === 'arrival' ? 'Arr' : 'P/U';
                    
                    let receptionCallHtml = "";
                    const normalizedHotelKey = stop.hotelName.toUpperCase().trim();
                    
                    let matchedKey = Object.keys(HOTEL_DIRECTORY).find(k => normalizedHotelKey.includes(k) || k.includes(normalizedHotelKey));
                    if (matchedKey) {
                        const recNum = HOTEL_DIRECTORY[matchedKey];
                        receptionCallHtml = `
                            <a href="tel:${recNum}" onclick="handleContactClick(event, 'RECEPTION', '${recNum}', 'tel')" class="inline-flex items-center gap-1 text-xs font-bold text-[#E07722] bg-orange-50 border border-orange-200 px-2 py-0.5 rounded-md hover:bg-orange-100 transition-all">
                                📞 Reception (${recNum})
                            </a>
                        `;
                    }

                    stopsHtml += `
                        <div class="p-3 bg-white border-b border-slate-100 last:border-0 space-y-2">
                            <div class="flex flex-wrap items-center justify-between gap-2 bg-orange-50/50 border-l-4 border-[#FF8833] p-2 rounded-r-xl">
                                <div class="flex items-center gap-2">
                                    <span class="text-sm font-black text-slate-800 uppercase tracking-wide">${highlightedHotel}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    ${receptionCallHtml}
                                    <span class="text-sm font-black bg-white text-slate-900 border border-slate-300 px-2.5 py-0.5 rounded-lg font-mono shadow-xs">
                                        🕒 ${timingLabel}: ${stop.pickupTime}
                                    </span>
                                </div>
                            </div>
                            <div class="space-y-0.5 px-1">
                                ${passengersHtml}
                            </div>
                        </div>
                    `;
                });

                if (!stopsHtml) return;

                const highlightedSupplier = highlightText(manifest.busSupplier, query);
                const highlightedFlight = highlightText(manifest.flight, query);
                const displayVoucher = manifest.voucherId !== "N/A" ? manifest.voucherId : "Run";

                let driverDialDestination = manifest.driverPhone ? `tel:${manifest.driverPhone}` : `tel:0035799000000`;
                let driverPhoneStyle = manifest.driverPhone ? 'bg-emerald-600 hover:bg-emerald-700 text-white border-emerald-700' : 'bg-slate-100 text-slate-400 border-slate-200 pointer-events-none opacity-50';
                let driverButtonLabel = manifest.driverPhone ? `📞 Call Driver (${manifest.driverPhone})` : `📞 No Driver`;

                const safeDriverName = "DRIVER";
                const safeDriverPhone = manifest.driverPhone ? manifest.driverPhone : "0035799000000";

                manifestBlock.innerHTML = `
                    <div class="bg-gradient-to-r from-[#1C2C5B] to-[#0A163A] text-white p-3 flex flex-wrap items-center justify-between gap-2 text-xs">
                        <div class="flex items-center gap-4">
                            <div>
                                <span class="text-slate-400 font-mono">Voucher:</span>
                                <span class="text-orange-400 font-bold">${displayVoucher}</span>
                            </div>
                            <div>
                                <span class="font-bold text-slate-200">${highlightedSupplier}</span>
                                <span class="text-slate-400 mx-1">|</span>
                                <span class="text-slate-300 text-[11px]">${manifest.vehicle}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-right">
                                <span class="font-black text-orange-400 uppercase">FLIGHT: ${highlightedFlight}</span>
                            </div>
                            <a href="${driverDialDestination}" onclick="handleContactClick(event, '${safeDriverName}', '${safeDriverPhone}', 'tel')" class="py-1 px-3 border rounded-lg font-bold text-[11px] transition-all ${driverPhoneStyle}">
                                ${driverButtonLabel}
                            </a>
                        </div>
                    </div>
                    <div class="divide-y divide-slate-100">
                        ${stopsHtml}
                    </div>
                `;

                container.appendChild(manifestBlock);
            });

            if (visibleCount === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 py-12 bg-white rounded-2xl border border-slate-200 text-sm shadow-2xs">No active transfers match your filtering settings.</div>`;
            }
        }
    </script>
</body>

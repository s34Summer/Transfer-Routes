<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyJet Holidays Inspired Dispatch Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- Secure, Local client-side QR Code rendering engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-[#F8FAFC] font-sans min-h-screen text-slate-900 antialiased pb-12">

    <!-- REFACTORED HEADER: Softer light orange gradient structure with modern iconography indicators -->
    <div class="sticky top-0 bg-gradient-to-r from-[#FF8833] to-[#FFAA66] text-white shadow-md px-3 py-3 z-20 rounded-b-3xl border-b-4 border-[#E07722]">
        <div class="max-w-xl lg:max-w-7xl mx-auto space-y-2.5">
            
            <!-- Dual File Upload Input Row Configuration with Embedded Action Icons -->
            <div class="grid grid-cols-2 gap-2 bg-white/15 p-2 rounded-2xl border border-white/20 text-[10px] lg:max-w-md lg:mx-auto shadow-inner">
                <div class="flex flex-col gap-1 border-r border-white/25 pr-2">
                    <span class="font-black tracking-wider uppercase text-orange-900/80 flex items-center gap-1">
                        <span>📥</span> 🛬 ARRIVALS PDF
                    </span>
                    <input type="file" id="pdfArrivals" accept=".pdf" class="text-orange-950 file:py-0.5 file:px-2 file:rounded-md file:border-0 file:text-[10px] file:font-black file:bg-white file:text-[#E07722] cursor-pointer hover:bg-orange-50 transition-all" />
                </div>
                <div class="flex flex-col gap-1 pl-1">
                    <span class="font-black tracking-wider uppercase text-orange-900/80 flex items-center gap-1">
                        <span>📤</span> 🛫 DEPARTURES PDF
                    </span>
                    <input type="file" id="pdfDepartures" accept=".pdf" class="text-orange-950 file:py-0.5 file:px-2 file:rounded-md file:border-0 file:text-[10px] file:font-black file:bg-white file:text-[#E07722] cursor-pointer hover:bg-orange-50 transition-all" />
                </div>
            </div>

            <!-- Global Lookup Input Field with Search Icon Indicator -->
            <div class="relative lg:max-w-md lg:mx-auto">
                <span class="absolute inset-y-0 left-3 flex items-center text-slate-400 text-xs">🔍</span>
                <input type="text" id="searchInput" disabled placeholder="Load a manifest file above..." class="w-full pl-8 pr-3 py-2.5 bg-white border border-orange-200/40 rounded-xl shadow-xs focus:outline-none focus:ring-2 focus:ring-[#1C2C5B] text-xs text-slate-900 font-semibold placeholder-slate-400 transition-all" />
            </div>

            <!-- Workspace Isolation Segment Tabs -->
            <div class="grid grid-cols-2 gap-1 bg-[#1C2C5B] p-1 rounded-xl text-center text-xs font-bold lg:max-w-md lg:mx-auto shadow-md">
                <button onclick="setActiveTab('arrival')" id="tabArrivalBtn" class="bg-gradient-to-r from-[#FF8833] to-[#FFAA66] text-white py-1.5 rounded-lg transition-all cursor-pointer shadow-xs flex items-center justify-center gap-1">
                    <span>🛬</span> Arrivals Only
                </button>
                <button onclick="setActiveTab('departure')" id="tabDepartureBtn" class="text-slate-300 py-1.5 rounded-lg transition-all cursor-pointer flex items-center justify-center gap-1 hover:text-white">
                    <span>🛫</span> Departures Only
                </button>
            </div>

            <!-- Prefix Sub-Filter Selection Bar -->
            <div class="flex flex-wrap gap-1 justify-center pt-0.5 lg:max-w-xl lg:mx-auto text-[10px] font-bold">
                <button onclick="setActivePrefix('ALL')" id="prefixAllBtn" class="bg-white text-[#1C2C5B] px-3 py-1 rounded-full shadow-xs transition-all cursor-pointer">📦 All Runs</button>
                <button onclick="setActivePrefix('TAXI')" id="prefixTaxiBtn" class="bg-[#1C2C5B]/30 text-white px-3 py-1 rounded-full transition-all cursor-pointer hover:bg-[#1C2C5B]/50">🚕 Taxis (ST/AP)</button>
                <button onclick="setActivePrefix('SHUTTLE')" id="prefixShuttleBtn" class="bg-[#1C2C5B]/30 text-white px-3 py-1 rounded-full transition-all cursor-pointer hover:bg-[#1C2C5B]/50">🚐 Shuttles (XC)</button>
                <button onclick="setActivePrefix('ADAPTED')" id="prefixAdaptedBtn" class="bg-[#1C2C5B]/30 text-white px-3 py-1 rounded-full transition-all cursor-pointer hover:bg-[#1C2C5B]/50">♿ Adapted (NC)</button>
            </div>
        </div>
    </div>

    <!-- Active Feed Grid Container (Option 2 Layout Structure) -->
    <div class="p-3 max-w-xl lg:max-w-7xl mx-auto mt-2">
        <div id="statusMessage" class="text-center text-slate-500 my-12 text-xs bg-white p-6 rounded-2xl border border-slate-200 shadow-sm max-w-xl mx-auto">
            🍊 System Ready. Please load your active manifest schedules into the panels above.
        </div>

        <!-- RENDER TARGET -->
        <div id="manifestsContainer" class="space-y-4 lg:space-y-0 lg:grid lg:grid-cols-2 lg:gap-4 xl:grid-cols-3"></div>
    </div>

    <!-- PC Desktop Verification Modal Window Block -->
    <div id="desktopModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" onclick="closeDesktopModal(event)">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl text-center space-y-4 border border-slate-100 transform scale-100 transition-all" onclick="event.stopPropagation()">
            <div class="w-12 h-12 bg-orange-50 text-[#FF8833] rounded-full flex items-center justify-center mx-auto text-xl font-bold">📲</div>
            <div>
                <h3 id="modalPassengerName" class="text-base font-black text-[#1C2C5B] uppercase tracking-wide">PASSENGER CONTACT</h3>
                <p id="modalPhoneNumber" class="text-lg font-mono font-bold text-slate-600 tracking-wider mt-1"></p>
                <p id="modalActionType" class="text-[10px] uppercase font-black tracking-widest text-[#FF8833] mt-0.5"></p>
            </div>
            
            <div id="qrcodeCanvas" class="flex justify-center p-3 bg-slate-50 rounded-2xl border border-slate-100 shadow-inner max-w-[186px] mx-auto"></div>
            
            <p class="text-[10px] text-slate-400 font-medium leading-relaxed px-4">Scan using your phone's camera lens layout to launch contact actions directly from the desktop browser hub.</p>
            
            <div class="grid grid-cols-2 gap-2 pt-1">
                <button onclick="copyModalNumber()" class="bg-slate-100 hover:bg-slate-200 text-[#1C2C5B] font-bold py-2.5 rounded-xl text-xs transition-all cursor-pointer">📋 Copy Number</button>
                <button onclick="document.getElementById('desktopModal').classList.add('hidden')" class="bg-rose-50 text-rose-600 hover:bg-rose-100 font-bold py-2.5 rounded-xl text-xs transition-all cursor-pointer">✕ Close</button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let extractedManifests = [];
        let activeTransferTab = 'arrival';
        let activePrefixTab = 'ALL'; 
        let currentModalPhoneRaw = "";

        const COMMENTS_SYSTEM_STATIC_URL = "https://s34summer.github.io/Easy-Jet-Call-Log/";
        const GPS_SYSTEM_STATIC_URL = "https://departures.summertimes.com.cy/";

        document.getElementById('searchInput').addEventListener('input', renderManifestCards, false);
        document.getElementById('pdfArrivals').addEventListener('change', (e) => handlePDFUpload(e, 'arrival'), false);
        document.getElementById('pdfDepartures').addEventListener('change', (e) => handlePDFUpload(e, 'departure'), false);

        // UI Adjustments for dynamic background rendering properties
        function highlightText(sourceText, queryText) {
            if (!queryText) return sourceText;
            const escapedQuery = queryText.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            return sourceText.replace(regex, '<mark class="bg-[#1C2C5B] text-white font-semibold px-1 rounded shadow-xs inline-block">$1</mark>');
        }

        function setActiveTab(tabType) {
            activeTransferTab = tabType;
            const arrBtn = document.getElementById('tabArrivalBtn');
            const depBtn = document.getElementById('tabDepartureBtn');

            if (tabType === 'arrival') {
                arrBtn.className = "bg-gradient-to-r from-[#FF8833] to-[#FFAA66] text-white py-1.5 rounded-lg transition-all cursor-pointer font-bold shadow-xs flex items-center justify-center gap-1";
                depBtn.className = "text-slate-300 py-1.5 rounded-lg transition-all cursor-pointer flex items-center justify-center gap-1 hover:text-white";
            } else {
                depBtn.className = "bg-gradient-to-r from-[#FF8833] to-[#FFAA66] text-white py-1.5 rounded-lg transition-all cursor-pointer font-bold shadow-xs flex items-center justify-center gap-1";
                arrBtn.className = "text-slate-300 py-1.5 rounded-lg transition-all cursor-pointer flex items-center justify-center gap-1 hover:text-white";
            }
            renderManifestCards();
        }

        function setActivePrefix(prefixType) {
            activePrefixTab = prefixType;
            const btns = {
                ALL: document.getElementById('prefixAllBtn'),
                TAXI: document.getElementById('prefixTaxiBtn'),
                SHUTTLE: document.getElementById('prefixShuttleBtn'),
                ADAPTED: document.getElementById('prefixAdaptedBtn')
            };

            Object.keys(btns).forEach(key => {
                if (key === prefixType) {
                    btns[key].className = "bg-white text-[#1C2C5B] px-3 py-1 rounded-full shadow-xs transition-all cursor-pointer";
                } else {
                    btns[key].className = "bg-[#1C2C5B]/30 text-white px-3 py-1 rounded-full transition-all cursor-pointer hover:bg-[#1C2C5B]/50";
                }
            });
            renderManifestCards();
        }

        function formatPhoneNumber(rawString) {
            if (!rawString) return "";
            let digits = rawString.replace(/\D/g, "");
            if (digits.length < 6 || /^0+$/.test(digits)) return ""; 
            if (digits.startsWith("00")) return digits;
            return "00" + digits; 
        }

        function handleSystemRedirect(refNum, systemUrlBase) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(refNum).then(() => {
                    window.open(`${systemUrlBase}?ref=${refNum}`, '_blank');
                }).catch(err => {
                    console.error("Clipboard copy failed: ", err);
                    window.open(`${systemUrlBase}?ref=${refNum}`, '_blank');
                });
            } else {
                window.open(`${systemUrlBase}?ref=${refNum}`, '_blank');
            }
        }

        function handleContactClick(event, name, phone, mode) {
            if (window.matchMedia("(min-width: 1024px)").matches) {
                event.preventDefault(); 
                
                currentModalPhoneRaw = phone;
                document.getElementById('modalPassengerName').innerText = name;
                document.getElementById('modalPhoneNumber').innerText = phone;
                document.getElementById('modalActionType').innerText = mode === 'tel' ? '📞 CELLULAR DIAL ROUTE' : '💬 WHATSAPP AUDIO CALL';
                
                document.getElementById('qrcodeCanvas').innerHTML = "";
                
                let qrPayload = "";
                if (mode === 'tel') {
                    qrPayload = `tel:${phone}`;
                } else {
                    let cleanWhatsAppNum = phone.replace(/^00/, "+");
                    qrPayload = `https://wa.me/${cleanWhatsAppNum}`;
                }
                
                new QRCode(document.getElementById("qrcodeCanvas"), {
                    text: qrPayload,
                    width: 160,
                    height: 160,
                    colorDark : "#1C2C5B",
                    colorLight : "#F8FAFC",
                    correctLevel : QRCode.CorrectLevel.H
                });
                
                document.getElementById('desktopModal').classList.remove('hidden');
            }
        }

        function closeDesktopModal(event) {
            document.getElementById('desktopModal').classList.add('hidden');
        }

        function copyModalNumber() {
            if (currentModalPhoneRaw) {
                navigator.clipboard.writeText(currentModalPhoneRaw);
                alert("Phone number copied to clipboard: " + currentModalPhoneRaw);
            }
        }

        async function handlePDFUpload(e, transferType) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('statusMessage').innerHTML = `<span class='text-[#FF8833] font-black animate-pulse'>⏳ PROCESSING ${transferType.toUpperCase()} MANIFEST...</span>`;
            
            const fileReader = new FileReader();
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        
                        const items = textContent.items.map(item => ({
                            text: item.str.trim(),
                            y: item.transform[5],
                            x: item.transform[4]
                        })).filter(item => item.text !== "");

                        if (items.length > 0) {
                            parseTwoRowPairedLayout(items, transferType);
                        }
                    }

                    finalizeParsing();

                } catch (error) {
                    console.error(error);
                    alert("Error parsing PDF data streams.");
                }
            };
            fileReader.readAsArrayBuffer(file);
        }

        function finalizeParsing() {
            if (extractedManifests.length > 0) {
                extractedManifests.forEach(manifest => {
                    manifest.stops.sort((a, b) => a.pickupTime.localeCompare(b.pickupTime));
                    if (manifest.stops.length > 0) {
                        manifest.sortTime = manifest.stops[0].pickupTime;
                    }
                });

                extractedManifests.sort((a, b) => (a.sortTime || "23:59").localeCompare(b.sortTime || "23:59"));

                document.getElementById('searchInput').disabled = false;
                document.getElementById('searchInput').placeholder = "🔍 Search Name, Ref, or Hotel...";
                document.getElementById('statusMessage').classList.add('hidden');
                setActiveTab(activeTransferTab);
            }
        }

        function parseTwoRowPairedLayout(items, transferType) {
            let lineMap = {};
            items.forEach(item => {
                let key = Math.round(item.y);
                let foundKey = Object.keys(lineMap).find(k => Math.abs(k - key) <= 6);
                if (foundKey) {
                    lineMap[foundKey].push(item);
                } else {
                    lineMap[key] = [item];
                }
            });

            let sortedYKeys = Object.keys(lineMap).sort((a, b) => b - a);
            let processedLines = sortedYKeys.map(key => {
                let rowItems = lineMap[key].sort((a, b) => a.x - b.x);
                return {
                    y: parseFloat(key),
                    text: rowItems.map(it => it.text).join(" "),
                    tokens: rowItems.map(it => it.text)
                };
            });

            let globalVoucherNo = "N/A";
            let flightCode = "N/A";
            let masterFlightTime = "00:00";
            let driverPhone = "";
            let busSupplierName = "easyJet Holidays";
            let vehicleType = "Coaches Transfer";
            let prefixCategory = "COACH"; 

            processedLines.forEach(line => {
                if (line.text.includes("Voucher No.")) {
                    const vMatch = line.text.match(/Voucher No\.\s*(\d+)/) || line.text.match(/No\.\s*(\d+)/);
                    if (vMatch) globalVoucherNo = vMatch[1];
                }
                if (line.text.includes("Flight") || line.text.match(/EZY\d+/i)) {
                    const fMatch = line.text.match(/Flight\s+([A-Z0-9]+)/i) || line.text.match(/(EZY\d+)/i);
                    if (fMatch) flightCode = fMatch[1];
                    const tMatch = line.text.match(/(\d{2}:\d{2})/);
                    if (tMatch) masterFlightTime = tMatch[1];
                }
                if (line.text.match(/Driver[:\s]+(\d+)/i)) {
                    const dMatch = line.text.match(/Driver[:\s]+(\d+)/i);
                    if (dMatch) driverPhone = dMatch[1].trim();
                }
                
                if (line.text.includes("Transport")) {
                    const tMatch = line.text.match(/Transport\s+([A-Z0-9]+)/i);
                    if (tMatch) {
                        const transportCode = tMatch[1].toUpperCase();
                        if (transportCode.startsWith("ST")) {
                            busSupplierName = "Stavrakis Taxi";
                            vehicleType = "Taxi Transfer";
                            driverPhone = "24102297"; 
                            prefixCategory = "TAXI";
                        } else if (transportCode.startsWith("AP")) {
                            busSupplierName = "Aphrodite Taxi";
                            vehicleType = "Taxi Transfer";
                            driverPhone = "26934555"; 
                            prefixCategory = "TAXI";
                        } else if (transportCode.startsWith("XC")) {
                            busSupplierName = "easyJet Holidays";
                            vehicleType = "Shuttle Transfer";
                            prefixCategory = "SHUTTLE";
                        } else if (transportCode.startsWith("NC")) {
                            busSupplierName = "easyJet Holidays";
                            vehicleType = "Adapted Transfer";
                            driverPhone = "22487308";
                            prefixCategory = "ADAPTED";
                        }
                    }
                }
            });

            for (let i = 0; i < processedLines.length; i++) {
                let currentLine = processedLines[i];
                const refMatch = currentLine.text.match(/\b(\d{7})\b/);

                if (refMatch) {
                    const refNum = refMatch[1];
                    let hotelName = "UNKNOWN PROPERTY";
                    let pickupTime = "00:00";

                    for (let j = i - 1; j >= 0; j--) {
                        let potentialHeader = processedLines[j];
                        let timeMatch = potentialHeader.text.match(/(\d{2}:\d{2})/);
                        
                        if (timeMatch && !potentialHeader.text.includes("EZY") && !potentialHeader.text.includes("PAX") && !potentialHeader.text.includes("Flight") && !potentialHeader.text.includes("Driver")) {
                            pickupTime = timeMatch[1];
                            hotelName = potentialHeader.text.replace(pickupTime, "")
                                                             .replace(/\b\d{5,6}\b/g, "") 
                                                             .trim();
                            break;
                        }
                    }

                    let clientPhone = "";
                    let leadName = "PASSENGER RECORD";
                    let calculatedPaxTotal = 1;

                    currentLine.tokens.forEach(token => {
                        let cleanDigits = token.replace(/\D/g, "");
                        if (cleanDigits.length >= 8 && cleanDigits !== refNum) {
                            clientPhone = formatPhoneNumber(token);
                        }
                    });

                    let joinedTokensStr = currentLine.tokens.join(" ");
                    let wordsArray = joinedTokensStr.split(/\s+/);

                    for (let k = 0; k < wordsArray.length; k++) {
                        let token = wordsArray[k];
                        if (/[A-Za-z]/.test(token) && !token.includes("EZY") && !token.includes("EASYJET") && !token.includes("HOLI")) {
                            leadName = token;
                            
                            let dynamicPaxList = [];
                            let checkIdx = k + 1;
                            
                            while (checkIdx < wordsArray.length) {
                                let targetToken = wordsArray[checkIdx];
                                let numericVal = targetToken.replace(/\D/g, "");
                                
                                if (numericVal === refNum || numericVal.length >= 8 || /[A-Za-z]/.test(targetToken)) {
                                    break;
                                }
                                if (numericVal.length > 0 && parseInt(numericVal, 10) < 15) {
                                    dynamicPaxList.push(parseInt(numericVal, 10));
                                }
                                checkIdx++;
                            }

                            if (dynamicPaxList.length > 0) {
                                calculatedPaxTotal = dynamicPaxList.reduce((sum, current) => sum + current, 0);
                            }
                            break;
                        }
                    }

                    let manifestGroupKey = (globalVoucherNo !== "N/A" ? globalVoucherNo : flightCode).toLowerCase().replace(/\s+/g, "");
                    let targetManifest = extractedManifests.find(m => m.groupKey === manifestGroupKey && m.type === transferType);

                    if (!targetManifest) {
                        targetManifest = {
                            groupKey: manifestGroupKey,
                            type: transferType,
                            voucherId: globalVoucherNo,
                            busSupplier: busSupplierName,
                            vehicle: vehicleType,
                            prefixCategory: prefixCategory, 
                            flight: flightCode,
                            routeTime: masterFlightTime,
                            sortTime: pickupTime,
                            driverPhone: driverPhone,
                            stops: [],
                            searchString: ""
                        };
                        extractedManifests.push(targetManifest);
                    }

                    let targetStop = targetManifest.stops.find(s => s.hotelName === hotelName);
                    if (!targetStop) {
                        targetStop = {
                            hotelName: hotelName,
                            pickupTime: pickupTime,
                            passengers: []
                        };
                        targetManifest.stops.push(targetStop);
                    }

                    if (!targetStop.passengers.some(p => p.refNum === refNum)) {
                        targetStop.passengers.push({
                            leadName: leadName.toUpperCase(),
                            refNum: refNum,
                            paxCount: calculatedPaxTotal,
                            clientPhone: clientPhone
                        });
                        targetManifest.searchString += ` ${leadName} ${refNum} ${hotelName}`.toLowerCase();
                    }
                }
            }
        }

        function renderManifestCards() {
            const query = document.getElementById('searchInput').value.trim();
            const lowerQuery = query.toLowerCase();
            const container = document.getElementById('manifestsContainer');
            container.innerHTML = '';

            let visibleCount = 0;

            extractedManifests.forEach(manifest => {
                if (manifest.type !== activeTransferTab) return;
                if (activePrefixTab !== 'ALL' && manifest.prefixCategory !== activePrefixTab) return;
                if (lowerQuery && !manifest.searchString.includes(lowerQuery) && !manifest.flight.toLowerCase().includes(lowerQuery) && !manifest.voucherId.toLowerCase().includes(lowerQuery)) return;

                visibleCount++;

                const manifestBlock = document.createElement('div');
                manifestBlock.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-fit";

                let stopsHtml = '';
                manifest.stops.forEach(stop => {
                    let passengersHtml = '';
                    
                    stop.passengers.forEach(p => {
                        const matchesName = p.leadName.toLowerCase().includes(lowerQuery);
                        const matchesRef = p.refNum.toLowerCase().includes(lowerQuery);
                        const matchesHotel = stop.hotelName.toLowerCase().includes(lowerQuery);
                        
                        if (lowerQuery && !matchesName && !matchesRef && !matchesHotel) return;

                        const safeRef = String(p.refNum).replace(/'/g, "\\'");
                        const highlightedName = highlightText(p.leadName, query);
                        const highlightedRef = highlightText(p.refNum, query);

                        let dialDestination = p.clientPhone ? `tel:${p.clientPhone}` : (manifest.driverPhone ? `tel:${manifest.driverPhone}` : `tel:0035799000000`);
                        let activePhoneStyle = p.clientPhone ? 'bg-emerald-50 text-emerald-600 border-emerald-200 hover:bg-emerald-100' : 'bg-slate-100 border-slate-200 hover:bg-slate-200';

                        let whatsappLink = "";
                        if (p.clientPhone) {
                            let cleanNumber = p.clientPhone.replace(/^00/, "+");
                            whatsappLink = `intent:///send/phone=${cleanNumber}#Intent;scheme=whatsapp;package=com.whatsapp;end`;
                        } else {
                            whatsappLink = "javascript:alert('No mobile number extracted for WhatsApp connection.')";
                        }

                        let activeWhatsAppStyle = p.clientPhone ? 'bg-green-50 text-green-600 border-green-200 hover:bg-green-100' : 'bg-slate-100 border-slate-200 hover:bg-slate-200 opacity-50';

                        const safeJSName = p.leadName.replace(/'/g, "\\'");
                        const safeJSPhone = p.clientPhone ? p.clientPhone : (manifest.driverPhone ? manifest.driverPhone : "0035799000000");

                        passengersHtml += `
                            <div class="flex items-center justify-between py-2 border-b border-slate-100 last:border-0 gap-4">
                                <div class="truncate flex-1">
                                    <div class="text-base font-medium text-slate-900 tracking-wide uppercase">
                                        ${highlightedName}
                                    </div>
                                    <div class="text-xs text-slate-500 font-mono mt-0.5 font-medium normal-case">
                                        Ref: <span class="text-slate-600 bg-slate-100 px-1 rounded font-semibold">${highlightedRef}</span>
                                        <span class="ml-2 px-1 rounded bg-orange-50 text-[#FF8833] font-bold">PAX: ${p.paxCount}</span>
                                    </div>
                                </div>
                                <div class="flex gap-1 shrink-0">
                                    <button onclick="handleSystemRedirect('${safeRef}', '${COMMENTS_SYSTEM_STATIC_URL}')" aria-label="Notes" class="w-9 h-9 bg-slate-100 border border-slate-200 rounded-lg flex items-center justify-center text-base cursor-pointer hover:bg-slate-200 transition-all">📝</button>
                                    <a href="${dialDestination}" onclick="handleContactClick(event, '${safeJSName}', '${safeJSPhone}', 'tel')" title="Cellular Dial" class="w-9 h-9 border rounded-lg flex items-center justify-center text-base transition-all shadow-2xs ${activePhoneStyle}">📞</a>
                                    <a href="${whatsappLink}" onclick="handleContactClick(event, '${safeJSName}', '${safeJSPhone}', 'whatsapp')" title="WhatsApp Call" class="w-9 h-9 border rounded-lg flex items-center justify-center text-base transition-all shadow-2xs ${activeWhatsAppStyle}">💬</a>
                                    <button onclick="handleSystemRedirect('${safeRef}', '${GPS_SYSTEM_STATIC_URL}')" aria-label="Track" class="w-9 h-9 bg-slate-100 border border-slate-200 rounded-lg flex items-center justify-center text-base cursor-pointer hover:bg-slate-200 transition-all">🚌</button>
                                </div>
                            </div>
                        `;
                    });

                    if (!passengersHtml) return;

                    const highlightedHotel = highlightText(stop.hotelName, query);
                    const timingLabel = manifest.type === 'arrival' ? 'Flight Arr' : 'Pick Up';

                    stopsHtml += `
                        <div class="p-3 bg-white border-b border-slate-100 last:border-0">
                            <div class="flex justify-between items-start mb-2 gap-2">
                                <span class="text-sm font-black text-[#FF8833] tracking-wide uppercase flex items-center gap-1.5 flex-1 leading-tight">
                                    <span class="inline-block w-1.5 h-1.5 rounded-full bg-slate-400 shrink-0"></span>
                                    ${highlightedHotel}
                                </span>
                                <span class="text-xs font-black bg-slate-100 text-slate-800 border border-slate-200 px-2 py-0.5 rounded-md font-mono shrink-0">🕒 ${timingLabel}: ${stop.pickupTime}</span>
                            </div>
                            <div class="pl-2.5 border-l-2 border-slate-200 space-y-1">
                                ${passengersHtml}
                            </div>
                        </div>
                    `;
                });

                const highlightedSupplier = highlightText(manifest.busSupplier, query);
                const highlightedFlight = highlightText(manifest.flight, query);
                const displayVoucher = manifest.voucherId !== "N/A" ? manifest.voucherId : "Unified Run";

                let driverDialDestination = manifest.driverPhone ? `tel:${manifest.driverPhone}` : `tel:0035799000000`;
                let driverPhoneStyle = manifest.driverPhone ? 'bg-emerald-500 hover:bg-emerald-600 text-white border-emerald-600' : 'bg-white/20 text-slate-200 border-white/20';
                let driverButtonLabel = manifest.driverPhone ? `📞 CALL DRIVER (${manifest.driverPhone})` : `📞 NO DRIVER ASSIGNED`;

                const safeDriverName = "ASSIGNED SUPPLIER DRIVER";
                const safeDriverPhone = manifest.driverPhone ? manifest.driverPhone : "0035799000000";

                manifestBlock.innerHTML = `
                    <div class="bg-gradient-to-r from-[#1C2C5B] to-[#0A163A] text-white p-3 space-y-2">
                        <div class="flex justify-between items-center text-[9px] font-mono font-semibold tracking-wider text-slate-300 mb-1 normal-case">
                            <span>Voucher ID: <span class="text-orange-400 font-bold">${displayVoucher}</span></span>
                            <span class="text-white bg-orange-600 px-1.5 py-0.5 rounded font-bold text-[8px] tracking-widest uppercase">${manifest.type} VIEW</span>
                        </div>
                        <div class="flex justify-between items-end mt-1">
                            <div>
                                <h2 class="text-xs font-semibold text-slate-200 normal-case leading-tight">${highlightedSupplier}</h2>
                                <p class="text-[11px] text-slate-400 font-medium normal-case mt-0.5">${manifest.vehicle}</p>
                            </div>
                            <div class="text-right shrink-0">
                                <span class="text-sm font-black tracking-wide text-orange-400 block uppercase">FLIGHT: ${highlightedFlight}</span>
                                <span class="text-[10px] text-slate-300 font-mono block">Time: ${manifest.routeTime}</span>
                            </div>
                        </div>
                        <div class="pt-1">
                            <a href="${driverDialDestination}" onclick="handleContactClick(event, '${safeDriverName}', '${safeDriverPhone}', 'tel')" class="w-full text-center block text-[10px] font-black tracking-widest py-1.5 px-3 border rounded-xl transition-all ${driverPhoneStyle}">
                                ${driverButtonLabel}
                            </a>
                        </div>
                    </div>
                    <div>
                        ${stopsHtml}
                    </div>
                `;

                container.appendChild(manifestBlock);
            });

            if (visibleCount === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 py-12 bg-white rounded-2xl border border-slate-200 text-xs shadow-2xs lg:col-span-2 xl:col-span-3">No active transfers match your filtering settings.</div>`;
            }
        }
    </script>
</body>
</html>
